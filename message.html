
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Management System Of AHNO</title>
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">  
    <link href="assets/css/style.css" rel="stylesheet">
    
    <style>
    input,textarea {
	margin-top: 10px;
	width: 100%;
	padding: 0px 20px 0px 20px;
	}
	
    </style>

</head>
<body>
<title> GET Emails </title>

</head>
<body>
			
			<div class="container">
      <div style="text-align:center; margin-top: 30px;">
      
      	  <div class="text-center" style="margin-top: 20px;">
       Welcome <span sec:authentication="name" style="font-size: 22px; color:green;">Username</span> - <span sec:authentication="principal.authorities">Roles</span>
      </div>
      
      	   <div class="text-center">
 		   <h1 th:text="${Visitor}" style="background-color: yellow; color:black;font-size: 100px; font-weight: bold;"></h1>
 		   </div>
      
       <a th:href="@{/edit}" style="text-align: center;" class="btn btn-success"> Go to Edit Penal </a> 
        <a th:href="@{/newsleter}" style="text-align: center;" class="btn btn-success"> USER Email </a>  
        <a th:href="@{/message}" style="text-align: center;" class="btn btn-success"> Message </a>    
      </div>
      
	 </div>
	 
   <div class="container">
 	
	        	<table class="table">
  <thead>
    <tr>
      <th scope="col">Subject</th>
      <th scope="col">Email</th>
      <th scope="col">Message</th>
      <th scope="col">Date</th>
      <th scop="col">Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="ms,iterStat: ${message}" th:if="${iterStat.index >= iterStat.size-10}">
      <td th:text="${ms.subject}"> </td>
      <td th:text="${ms.email}" style="font-weight: bold; color:green"> </td>
      <td th:text="${ms.messages}"> </td>
      <td th:text="${#dates.format(ms.getDate, 'MM/dd/yyyy')}"> </td>
      <td> 
     	<a th:href="@{/delete/messages/(id=${ms.getId})}"   class="btn btn-danger"    id="deleteButton" >Delete<i class="icon_close_alt2"></i></a>
      </td>
    </tr>
  </tbody>
</table>
 	
 			
 		</div>	
 		
 		
 		       <!-- Start Delete  Record -->

<div class="modal" id="deleteModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirm Delete</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <p>Are you sure to delete this records?</p>
      </div>
      <div class="modal-footer">
        <a class="btn btn-primary" id="confirmDeleteButton" href="">Delete</a>
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>


      <script src="assets/js/jquery.js"></script>	
    <script src="assets/js/bootstrap.min.js"></script>
     <script src="assets/js/edit.js"></script>  
</body>
</html>
